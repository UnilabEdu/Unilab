<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
            background: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-form {
            background: #ffffff;
            padding: 40px 30px;
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
            display: flex;
            flex-direction: column;
            width: 300px;
        }

        .login-form input {
            padding: 12px 15px;
            margin-bottom: 20px;
            border: 1px solid #969696;
            border-radius: 8px;
        }

        .login-form input:focus {
            border-color: #5b8def;
            box-shadow: 0 0 5px rgba(91, 141, 239, 0.3);
            outline: none;
        }

        .login-form button {
            padding: 12px 15px;
            background-color: #4671d5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s ease;
        }

        .login-form button:hover {
            background-color: #5b8def;
        }

        .login-form .error {
            color: #ff4d4f;
            background: #ffe6e6;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 15px;
            font-size: 13px;
            text-align: center;
        }
    </style>
</head>

<body>
    <form method="POST" class="login-form">
        {% with messages = get_flashed_messages(category_filter=["error"]) %}
          {% if messages %}
        <div class="error">{{ messages[0] }}</div>
        {% endif %}
        {% endwith %}

        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">ავტორიზაცია</button>
    </form>
</body>

</html>
